name = "battle-buddy"
main = "src/server/worker.ts"
compatibility_date = "2024-09-23"

# Create a KV namespace with:
#   wrangler kv:namespace create ROOMS
# Then fill in the id and preview_id below.
[[kv_namespaces]]
binding = "ROOMS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"
